name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npx tsc

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          fail_ci_if_error: false

      - name: Cache Stryker incremental
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: actions/cache@v4
        with:
          path: .stryker-tmp/incremental.json
          key: stryker-${{ github.ref }}-${{ hashFiles('src/core/**/*.ts', 'tests/**/*.ts') }}
          restore-keys: |
            stryker-${{ github.ref }}-
            stryker-refs/heads/main-

      - name: Run mutation tests
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm run test:mutate
        continue-on-error: true

      - name: Upload mutation report
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22 && always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 30
