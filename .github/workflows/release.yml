name: Create GitHub Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Extract tag name
        id: tag
        run: echo "name=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Strip 'v' prefix to get version number
          VERSION="${{ steps.tag.outputs.name }}"
          VERSION="${VERSION#v}"

          # Extract notes between this version's header and the next
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)

          # Write to file for gh release
          if [ -n "$NOTES" ]; then
            echo "$NOTES" > release-notes.md
          else
            echo "Release ${{ steps.tag.outputs.name }}" > release-notes.md
          fi

      - name: Determine pre-release
        id: prerelease
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          VERSION="${VERSION#v}"
          if [[ "$VERSION" == 0.* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.tag.outputs.name }}" \
            --title "${{ steps.tag.outputs.name }}" \
            --notes-file release-notes.md \
            ${{ steps.prerelease.outputs.flag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify website to sync CLI data
        continue-on-error: true
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          VERSION="${VERSION#v}"
          CHANGELOG=$(jq -Rs . < release-notes.md)
          jq -n --arg v "$VERSION" --argjson cl "$CHANGELOG" \
            '{"event_type":"cli-release","client_payload":{"version":$v,"changelog":$cl}}' \
            | gh api repos/kastelldev/kastell-website/dispatches --method POST --input -
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_SYNC_PAT }}
